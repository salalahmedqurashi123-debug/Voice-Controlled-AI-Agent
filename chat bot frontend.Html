<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat-CED</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('bg.jpeg');
      background-size: cover;
      /* Ensure the image covers the entire body area */
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(0px);
      z-index: -1;
    }

    .chat-container {
      width: 100%;
      max-width: 450px;
      height: 70vh;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideIn 0.8s ease;
      background: rgba(255, 255, 255, 0.8);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(50px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-header {
      background-color: rgba(74, 71, 163, 0.9);
      color: #ffffff;
      padding: 1.2rem;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }

    .chat-box {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scroll-behavior: smooth;
      background-color: rgba(255, 255, 255, 0.8);
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    .input-container {
      display: flex;
      padding: 1rem;
      background-color: rgba(240, 240, 240, 0.9);
      justify-content: space-around;
      position: relative;
    }

    #user-input {
      padding: 0.6rem;
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
      transition: all 0.3s ease;
      font-size: 1rem;
      width: 100%;
    }

    #user-input:focus {
      border-color: #6a11cb;
      box-shadow: 0 0 5px rgba(106, 17, 203, 0.5);
    }

    #mic-btn-sort {
      transform: rotate(90deg);
    }

    #send-btn {
      background-color: #6a11cb;
      color: white;
      border: none;
      padding-inline: .4rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    #send-btn:hover {
      background-color: #4a47a3;
      transform: scale(1.05);
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 20px;
      display: inline-block;
      line-height: 1.4;
      font-size: 1rem;
      position: relative;
      background-color: rgba(255, 255, 255, 0.9);
      color: #333;
      animation: fadeIn 0.3s ease;
    }

    .user {
      align-self: flex-end;
      background-color: rgba(209, 231, 255, 0.9);
      color: #007bff;
      border-top-right-radius: 0;
    }

    .chatgpt {
      align-self: flex-start;
      background-color: rgba(241, 241, 241, 0.9);
      color: #333;
      border-top-left-radius: 0;
    }

    .border {
      border: 1px solid red;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">Chat - College Education Department</div>
    <div id="chat-main" class="chat-box"></div>
    <div class="input-container border-t">
      <input type="text" class="chat-input" id="user-input" placeholder="Type your message here..."
        onkeydown="handleKeyPress(event)">
      <div
        class="mic-btns absolute bg-cyan-500 rounded-full top-6 right-20 border flex items-center justify-between">
        <div class="hover:bg-cyan-900 px-3 rounded-full transition-all duration-200 cursor-pointer hover:text-white">
          <i class="fas fa-microphone" id="mic-btn"></i>
        </div>
        <hr class="h-5 border border-black">
        <div class="hover:bg-cyan-900 px-3 rounded-full transition-all duration-200 cursor-pointer hover:text-white">
          <i class="fas fa-sort-up" id="mic-btn-sort"></i>
        </div>
      </div>
      <button id="send-btn" class="border">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
